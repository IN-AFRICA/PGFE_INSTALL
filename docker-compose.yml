services:
  # ── Base de données MySQL ──
  database:
    image: mysql:8.0
    container_name: pgfe-database
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-pgfe_root_secret}
      MYSQL_DATABASE: ${DB_DATABASE:-pgfe_db}
      MYSQL_USER: ${DB_USERNAME:-pgfe_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-pgfe_secret}
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - pgfe-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-pgfe_root_secret}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Backend Laravel (PHP-FPM) ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pgfe-backend
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_KEY: ${APP_KEY}
      APP_URL: http://localhost
      APP_TIMEZONE: ${APP_TIMEZONE:-Africa/Lubumbashi}
      DB_CONNECTION: mysql
      DB_HOST: database
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-pgfe_db}
      DB_USERNAME: ${DB_USERNAME:-pgfe_user}
      DB_PASSWORD: ${DB_PASSWORD:-pgfe_secret}
      MYSQL_SSL_MODE: ${MYSQL_SSL_MODE:-disabled}
      MYSQL_CLIENT_SSL_MODE: ${MYSQL_CLIENT_SSL_MODE:-disabled}
      SESSION_DRIVER: ${SESSION_DRIVER:-file}
      CACHE_STORE: ${CACHE_STORE:-file}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-sync}
      SKIP_SEEDING: ${SKIP_SEEDING}
    volumes:
      - backend-storage:/var/www/html/storage
    networks:
      - pgfe-network
    expose:
      - "9000"
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t >/dev/null 2>&1 && ps -C php-fpm >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Backend API Gateway (nginx FastCGI → php-fpm) ──
  nginx-api:
    build:
      context: ./backend
      dockerfile: Dockerfile.nginx-api
    container_name: pgfe-nginx-api
    restart: unless-stopped
    ports:
      - "8400:8400"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - pgfe-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8400/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # ── Frontend Vue.js (nginx SPA) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pgfe-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      nginx-api:
        condition: service_healthy
    networks:
      - pgfe-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  db-data:
    driver: local
  backend-storage:
    driver: local

networks:
  pgfe-network:
    driver: bridge